context:
  version: "1.5.4"

recipe:
  name: duckdb-split
  version: ${{ version }}

source:
  # (!!) Please also update the git used for OVERRIDE_GIT_DESCRIBE in the build scripts.
  - url: https://github.com/duckdb/duckdb/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 99c36e4bf415f295e19ed67401adb72e075e63e6a0dc3a14312c986e29781fd0
    patches:
      - patches/0001-Dynamically-link-the-cli.patch
      - patches/0002-Make-extensions-prefix-free.patch
      - patches/0006-Install-.h-headers.patch

build:
  number: 1
  skip: win

outputs:
  # Build DuckDB and all extensions once, then split the artifacts into the
  # individual packages below via the multiple-output cache.
  - staging:
      name: duckdb-build
    build:
      script:
        file: build.sh
        env:
          PKG_VERSION: ${{ version }}
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - icu
        - openssl
        - libcurl
        - croaring

  - package:
      name: libduckdb
    inherit: duckdb-build
    build:
      script:
        file: install-lib.sh
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
      host:
        - openssl
        - icu
      run_exports:
        - ${{ pin_subpackage("libduckdb", upper_bound="x.x.x") }}
    tests:
      - script:
          - test -f $PREFIX/lib/libduckdb${SHLIB_EXT}

  - package:
      name: libduckdb-devel
    inherit: duckdb-build
    build:
      script:
        file: install-headers.sh
    requirements:
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
    tests:
      - script:
          - test -f $PREFIX/include/duckdb.h
          - test -f $PREFIX/include/duckdb/common/adbc/adbc.h

  - package:
      name: duckdb-cli
    inherit: duckdb-build
    build:
      script:
        file: install-cli.sh
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
    tests:
      - files:
          recipe:
            - test-builtin-extensions.sh
        requirements:
          run:
            - jq
        script:
          - duckdb -version
          - bash test-builtin-extensions.sh

  - package:
      name: duckdb-extension-json
    inherit: duckdb-build
    # Empty placeholder package as this is now built-in
    build:
      script:
        file: noop.sh
    requirements:
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
    tests:
      - script:
          - exit 0

  - package:
      name: duckdb-extension-autocomplete
    inherit: duckdb-build
    # Empty placeholder package as this is now built-in
    build:
      script:
        file: noop.sh
    requirements:
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
    tests:
      - script:
          - exit 0

  - package:
      name: duckdb-extension-tpcds
    inherit: duckdb-build
    build:
      dynamic_linking:
        binary_relocation: false
      script:
        file: install-extension.sh
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
    tests:
      - files:
          recipe:
            - test-extension.sh
        requirements:
          run:
            - duckdb-cli
            - jq
        script:
          - bash test-extension.sh tpcds

  - package:
      name: duckdb-extension-httpfs
    inherit: duckdb-build
    build:
      dynamic_linking:
        binary_relocation: false
      script:
        file: install-extension.sh
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
        - openssl
        - libcurl
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
    tests:
      - files:
          recipe:
            - test-extension.sh
        requirements:
          run:
            - duckdb-cli
            - jq
        script:
          - bash test-extension.sh httpfs

  - package:
      name: duckdb-extension-fts
    inherit: duckdb-build
    build:
      dynamic_linking:
        binary_relocation: false
      script:
        file: install-extension.sh
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
        - openssl
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
    tests:
      - files:
          recipe:
            - test-extension.sh
        requirements:
          run:
            - duckdb-cli
            - jq
        script:
          - bash test-extension.sh fts

  - package:
      name: duckdb-extension-tpch
    inherit: duckdb-build
    build:
      dynamic_linking:
        binary_relocation: false
      script:
        file: install-extension.sh
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
    tests:
      - files:
          recipe:
            - test-extension.sh
        requirements:
          run:
            - duckdb-cli
            - jq
        script:
          - bash test-extension.sh tpch

  - package:
      name: duckdb-extension-ducklake
    inherit: duckdb-build
    build:
      dynamic_linking:
        binary_relocation: false
      script:
        file: install-extension.sh
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
        - croaring
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
        - croaring
    tests:
      - files:
          recipe:
            - test-extension.sh
        requirements:
          run:
            - duckdb-cli
            - jq
        script:
          - bash test-extension.sh ducklake

about:
  homepage: https://www.duckdb.org/
  license: MIT
  license_file: LICENSE
  summary: An Embeddable Analytical Database
  description: |
    DuckDB is an embedded database designed to execute analytical SQL queries
    fast while embedded in another process. It is designed to be easy to
    install and easy to use.
  documentation: https://duckdb.org/docs/index.html
  repository: https://github.com/duckdb/duckdb

extra:
  recipe-maintainers:
    - xhochy
    - janjagusch
    - flaviomartins
