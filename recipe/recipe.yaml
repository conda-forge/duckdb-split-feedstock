context:
  version: "1.5.4"

recipe:
  name: duckdb-split
  version: ${{ version }}

source:
  # (!!) Please also update the git used for OVERRIDE_GIT_DESCRIBE in the build scripts.
  - url: https://github.com/duckdb/duckdb/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 99c36e4bf415f295e19ed67401adb72e075e63e6a0dc3a14312c986e29781fd0
    patches:
      - patches/0001-Dynamically-link-the-cli.patch
      - patches/0002-Make-extensions-prefix-free.patch
      - patches/0006-Install-.h-headers.patch

build:
  number: 1
  skip: win

outputs:
  # Build DuckDB and all extensions once, then split the artifacts into the
  # individual packages below via the multiple-output cache.
  - staging:
      name: duckdb-build
    build:
      script:
        file: build.sh
        env:
          PKG_VERSION: ${{ version }}
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - icu
        - openssl
        - libcurl
        - croaring

  - package:
      name: libduckdb
    inherit:
      from: duckdb-build
      run_exports: false
    build:
      script:
        file: install-lib.sh
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
      host:
        - openssl
        - icu
      run_exports:
        - ${{ pin_subpackage("libduckdb", upper_bound="x.x.x") }}
    tests:
      - script:
          - test -f $PREFIX/lib/libduckdb${SHLIB_EXT}

  - package:
      name: libduckdb-devel
    inherit:
      from: duckdb-build
      run_exports: false
    build:
      script:
        file: install-headers.sh
    requirements:
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
    tests:
      - script:
          - test -f $PREFIX/include/duckdb.h
          - test -f $PREFIX/include/duckdb/common/adbc/adbc.h

  - package:
      name: duckdb-cli
    inherit:
      from: duckdb-build
      run_exports: false
    build:
      script:
        file: install-cli.sh
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
    tests:
      - requirements:
          run:
            - jq
        script: |
          set -euo pipefail
          duckdb -version
          # Check that the statically linked (built-in) extensions are as expected.
          QUERY="select extension_name from duckdb_extensions() where (installed and install_mode = 'STATICALLY_LINKED');"
          duckdb -c "${QUERY}"
          duckdb -json -c "${QUERY}" | jq -r -e '
            map(.extension_name) as $actual
            | (["autocomplete", "core_functions", "icu", "json", "parquet", "shell"] | sort) as $expected
            | ($actual | sort) == $expected
          '

  - package:
      name: duckdb-extension-json
    inherit:
      from: duckdb-build
      run_exports: false
    # Empty placeholder package as this is now built-in
    build:
      script:
        file: noop.sh
    requirements:
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
    tests:
      - script:
          - exit 0

  - package:
      name: duckdb-extension-autocomplete
    inherit:
      from: duckdb-build
      run_exports: false
    # Empty placeholder package as this is now built-in
    build:
      script:
        file: noop.sh
    requirements:
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
    tests:
      - script:
          - exit 0

  - package:
      name: duckdb-extension-tpcds
    inherit:
      from: duckdb-build
      run_exports: false
    build:
      dynamic_linking:
        binary_relocation: false
      script:
        file: install-extension.sh
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
    tests:
      - requirements:
          run:
            - duckdb-cli
            - jq
        script: |
          set -euo pipefail
          EXTENSION_NAME="tpcds"
          # Only loadable (non-statically-linked) extensions should be present.
          QUERY="select extension_name from duckdb_extensions() where (installed and install_mode != 'STATICALLY_LINKED');"
          QUERY_RESULT="$(duckdb -json -c "${QUERY}")"
          if [[ "$(echo "${QUERY_RESULT}" | jq -r '.[].extension_name')" == "${EXTENSION_NAME}" ]]; then
            echo "Test whether the extension loads in unsigned mode"
            duckdb -unsigned -bail -json -c "LOAD ${EXTENSION_NAME};"
          else
            exit 1
          fi

  - package:
      name: duckdb-extension-httpfs
    inherit:
      from: duckdb-build
      run_exports: false
    build:
      dynamic_linking:
        binary_relocation: false
      script:
        file: install-extension.sh
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
        - openssl
        - libcurl
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
    tests:
      - requirements:
          run:
            - duckdb-cli
            - jq
        script: |
          set -euo pipefail
          EXTENSION_NAME="httpfs"
          # Only loadable (non-statically-linked) extensions should be present.
          QUERY="select extension_name from duckdb_extensions() where (installed and install_mode != 'STATICALLY_LINKED');"
          QUERY_RESULT="$(duckdb -json -c "${QUERY}")"
          if [[ "$(echo "${QUERY_RESULT}" | jq -r '.[].extension_name')" == "${EXTENSION_NAME}" ]]; then
            echo "Test whether the extension loads in unsigned mode"
            duckdb -unsigned -bail -json -c "LOAD ${EXTENSION_NAME};"
          else
            exit 1
          fi

  - package:
      name: duckdb-extension-fts
    inherit:
      from: duckdb-build
      run_exports: false
    build:
      dynamic_linking:
        binary_relocation: false
      script:
        file: install-extension.sh
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
        - openssl
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
    tests:
      - requirements:
          run:
            - duckdb-cli
            - jq
        script: |
          set -euo pipefail
          EXTENSION_NAME="fts"
          # Only loadable (non-statically-linked) extensions should be present.
          QUERY="select extension_name from duckdb_extensions() where (installed and install_mode != 'STATICALLY_LINKED');"
          QUERY_RESULT="$(duckdb -json -c "${QUERY}")"
          if [[ "$(echo "${QUERY_RESULT}" | jq -r '.[].extension_name')" == "${EXTENSION_NAME}" ]]; then
            echo "Test whether the extension loads in unsigned mode"
            duckdb -unsigned -bail -json -c "LOAD ${EXTENSION_NAME};"
          else
            exit 1
          fi

  - package:
      name: duckdb-extension-tpch
    inherit:
      from: duckdb-build
      run_exports: false
    build:
      dynamic_linking:
        binary_relocation: false
      script:
        file: install-extension.sh
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
    tests:
      - requirements:
          run:
            - duckdb-cli
            - jq
        script: |
          set -euo pipefail
          EXTENSION_NAME="tpch"
          # Only loadable (non-statically-linked) extensions should be present.
          QUERY="select extension_name from duckdb_extensions() where (installed and install_mode != 'STATICALLY_LINKED');"
          QUERY_RESULT="$(duckdb -json -c "${QUERY}")"
          if [[ "$(echo "${QUERY_RESULT}" | jq -r '.[].extension_name')" == "${EXTENSION_NAME}" ]]; then
            echo "Test whether the extension loads in unsigned mode"
            duckdb -unsigned -bail -json -c "LOAD ${EXTENSION_NAME};"
          else
            exit 1
          fi

  - package:
      name: duckdb-extension-ducklake
    inherit:
      from: duckdb-build
      run_exports: false
    build:
      dynamic_linking:
        binary_relocation: false
      script:
        file: install-extension.sh
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
      host:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
        - croaring
      run:
        - ${{ pin_subpackage("libduckdb", exact=True) }}
    tests:
      - requirements:
          run:
            - duckdb-cli
            - jq
        script: |
          set -euo pipefail
          EXTENSION_NAME="ducklake"
          # Only loadable (non-statically-linked) extensions should be present.
          QUERY="select extension_name from duckdb_extensions() where (installed and install_mode != 'STATICALLY_LINKED');"
          QUERY_RESULT="$(duckdb -json -c "${QUERY}")"
          if [[ "$(echo "${QUERY_RESULT}" | jq -r '.[].extension_name')" == "${EXTENSION_NAME}" ]]; then
            echo "Test whether the extension loads in unsigned mode"
            duckdb -unsigned -bail -json -c "LOAD ${EXTENSION_NAME};"
          else
            exit 1
          fi

about:
  homepage: https://www.duckdb.org/
  license: MIT
  license_file: LICENSE
  summary: An Embeddable Analytical Database
  description: |
    DuckDB is an embedded database designed to execute analytical SQL queries
    fast while embedded in another process. It is designed to be easy to
    install and easy to use.
  documentation: https://duckdb.org/docs/index.html
  repository: https://github.com/duckdb/duckdb

extra:
  recipe-maintainers:
    - xhochy
    - janjagusch
    - flaviomartins
